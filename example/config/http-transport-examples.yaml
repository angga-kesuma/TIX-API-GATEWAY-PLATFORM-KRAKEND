# Example HTTP Transport Configuration for Different Scenarios

## Production - Balanced Configuration
# Recommended for most production API gateway scenarios
http_client_production:
  max_idle_conns: 100
  max_idle_conns_per_host: 50
  max_conns_per_host: 100
  idle_conn_timeout: 90s
  time_out: 120s
  dial_timeout: 30s
  dial_keep_alive: 30s
  tls_handshake_timeout: 10s
  expect_continue_timeout: 1s
  response_header_timeout: 30s
  force_tls: true
  disable_keep_alives: false
  disable_compression: false
  insecure_skip_verify: false

## High-Traffic Scenario
# For APIs handling high request volumes
http_client_high_traffic:
  max_idle_conns: 250
  max_idle_conns_per_host: 100
  max_conns_per_host: 200
  idle_conn_timeout: 60s
  time_out: 90s
  dial_timeout: 20s
  dial_keep_alive: 30s
  tls_handshake_timeout: 8s
  expect_continue_timeout: 1s
  response_header_timeout: 20s
  force_tls: true
  disable_keep_alives: false
  disable_compression: false
  insecure_skip_verify: false

## Latency-Sensitive Scenario
# For APIs where response time is critical
http_client_low_latency:
  max_idle_conns: 150
  max_idle_conns_per_host: 75
  max_conns_per_host: 150
  idle_conn_timeout: 60s
  time_out: 60s
  dial_timeout: 15s
  dial_keep_alive: 15s
  tls_handshake_timeout: 5s
  expect_continue_timeout: 500ms
  response_header_timeout: 15s
  force_tls: true
  disable_keep_alives: false
  disable_compression: false
  insecure_skip_verify: false

## Conservative/Stable Scenario
# For protecting downstream services or limited resources
http_client_conservative:
  max_idle_conns: 50
  max_idle_conns_per_host: 20
  max_conns_per_host: 50
  idle_conn_timeout: 120s
  time_out: 180s
  dial_timeout: 45s
  dial_keep_alive: 45s
  tls_handshake_timeout: 15s
  expect_continue_timeout: 2s
  response_header_timeout: 45s
  force_tls: true
  disable_keep_alives: false
  disable_compression: false
  insecure_skip_verify: false

## Development/Testing
# For development and testing environments
http_client_dev:
  max_idle_conns: 10
  max_idle_conns_per_host: 5
  max_conns_per_host: 10
  idle_conn_timeout: 30s
  time_out: 60s
  dial_timeout: 30s
  dial_keep_alive: 30s
  tls_handshake_timeout: 10s
  expect_continue_timeout: 1s
  response_header_timeout: 30s
  force_tls: false
  disable_keep_alives: false
  disable_compression: true  # Easier debugging
  insecure_skip_verify: true  # Self-signed certs allowed
